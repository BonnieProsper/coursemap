name: Refresh datasets

# Runs on the 1st of every month at 03:00 UTC (before semester enrolments open).
# Also runnable manually via Actions → "Run workflow".
on:
  schedule:
    - cron: '0 3 1 * *'
  workflow_dispatch:
    inputs:
      limit:
        description: 'Limit prerequisite scrape to N courses (leave blank for full run)'
        required: false
        default: ''

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write        # needed to commit updated datasets
      pull-requests: write   # needed to open the PR

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -e ".[ingestion,dev]"

      - name: Scrape qualifications and course catalogue
        run: |
          python -m coursemap.ingestion.fetch_qualifications
          python -m coursemap.ingestion.fetch_courses

      - name: Scrape major pages (required + elective pools)
        run: python -m coursemap.ingestion.build_majors_dataset

      - name: Backfill elective pool credit requirements
        run: python -m coursemap.ingestion.backfill_elective_credits

      - name: Refresh prerequisites
        run: |
          LIMIT="${{ github.event.inputs.limit }}"
          if [ -n "$LIMIT" ]; then
            python -m coursemap.ingestion.refresh_prerequisites --limit "$LIMIT"
          else
            python -m coursemap.ingestion.refresh_prerequisites --workers 8
          fi

      - name: Validate refreshed datasets
        run: |
          python -m coursemap.cli.main validate --quiet
          echo "Dataset validation passed."

      - name: Run tests against refreshed data
        run: pytest tests/ -v --tb=short

      - name: Check for changes
        id: diff
        run: |
          git diff --quiet datasets/ && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Open pull request with updated datasets
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: datasets/auto-refresh-${{ github.run_number }}
          commit-message: "datasets: auto-refresh ${{ github.run_id }}"
          title: "🔄 Dataset refresh — ${{ github.run_id }}"
          body: |
            Automated monthly dataset refresh from Massey's course catalogue.

            **What changed:**
            - Course offerings, prerequisites, and titles updated from massey.ac.nz
            - Major requirement trees re-scraped
            - Elective pool credit requirements backfilled

            **Next steps:**
            1. Review the diff in `datasets/` for unexpected changes (retired courses, renamed majors, etc.)
            2. Run `coursemap validate` locally on the branch to confirm zero errors
            3. Merge when satisfied

            > Auto-generated by the `refresh-datasets` workflow. Run ID: ${{ github.run_id }}
          labels: datasets,automated
